run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck      # check error return values
    - gofmt         # check code formatting
    - goimports     # check import formatting
    - gosimple      # Suggests code simplifications
    - govet         # Reports potential structural issues
    - ineffassign   # Detects unused assignments
    - staticcheck   # Advanced static analysis (the top)
    - unused        # Finds unused code, constants, or functions
    - gocyclo       # Checks cyclomatic complexity (too long functions)
    - revive        # Modern replacement for golint (style rules)
    - gofmt         # Verifies native Go formatting

linters-settings:
  gocyclo:
    min-complexity: 15 # If a function has complexity > 15, it should be split into smaller functions

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0