name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 8 * * 1' 

permissions: read-all

jobs:
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6.0
      - uses: github/codeql-action/init@v4
        with:
          languages: go
      - uses: github/codeql-action/analyze@v4.36

  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0
      - uses: aquasecurity/trivy-action@v0.36
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@v4.36
        with:
          sarif_file: scorecard.sarif