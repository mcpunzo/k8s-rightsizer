{{- if .Values.storage.create -}}
{{- if .Values.storage.hostPath }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.recommendations.pvcName }}-pv
spec:
  capacity:
    storage: {{ .Values.storage.size }}
  accessModes:
    - {{ .Values.storage.accessMode }}
  storageClassName: {{ .Values.storage.storageClass }}
  hostPath:
    path: {{ .Values.storage.hostPath }}
---
{{- end }}

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.recommendations.pvcName }}
spec:
  accessModes:
    - {{ .Values.storage.accessMode }}
  resources:
    requests:
      storage: {{ .Values.storage.size }}
  storageClassName: {{ .Values.storage.storageClass }}
  {{- if .Values.storage.hostPath }}
  volumeName: {{ .Values.recommendations.pvcName }}-pv
  {{- end }}
{{- end }}