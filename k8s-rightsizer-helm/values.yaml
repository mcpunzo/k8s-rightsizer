image:
  pullPolicy: IfNotPresent
  
# Recommendations configuration
recommendations:
  pvcName: "recommendations-data-pvc" # The PVC where you upload the files
  fileName: "recommendations.xlsx"
  mountPath: "/data"

settings:
  resizeOnRecreate: false # Allow resizing if the workload update strategy is Recreate (default: false)
  dryRun: false # Enable dry-run mode (default: false)
  workers: 1 # Number of concurrent workers for processing recommendations (default: 1)
  resizeStrategy: "container" # Resize strategy to use (default: container, options: container, workload)
  useLimits: false # Use resource limits to set limits on containers (default: false)

rbac:
  create: true